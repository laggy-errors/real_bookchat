<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Leather Gradient -->
    <linearGradient id="leatherGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a2511" />
      <stop offset="50%" stop-color="#2e1407" />
      <stop offset="100%" stop-color="#190902" />
    </linearGradient>
    
    <!-- Antique Ornate Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf5e6" />
      <stop offset="20%" stop-color="#f3e5ab" />
      <stop offset="50%" stop-color="#d4af37" />
      <stop offset="80%" stop-color="#aa7c11" />
      <stop offset="100%" stop-color="#5a3d05" />
    </linearGradient>

    <!-- Drop Shadow for Depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>

  <!-- Background Base / Rounded Hardcover Texture -->
  <rect width="512" height="512" rx="112" fill="url(#leatherGrad)" />
  
  <!-- Gilded Double Filigree Corner Accent Borders -->
  <rect x="28" y="28" width="456" height="456" rx="84" fill="none" stroke="url(#goldGrad)" stroke-width="6" opacity="0.85" />
  <rect x="42" y="42" width="428" height="428" rx="70" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6" />

  <!-- Center Group with Shadow -->
  <g filter="url(#shadow)">
    <!-- Ornate Gilded Book Cover Seal -->
    <path d="M 256,120 C 310,120 380,150 380,220 C 380,310 256,392 256,392 C 256,392 132,310 132,220 C 132,150 202,120 256,120 Z" fill="none" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Open Book / Pages Emblem -->
    <path d="M 190,260 C 220,245 250,250 256,255 C 262,250 292,245 322,260 L 322,190 C 292,175 262,180 256,185 C 250,180 220,175 190,190 Z" fill="url(#goldGrad)" />
    
    <!-- Book Spine center line divider -->
    <line x1="256" y1="185" x2="256" y2="255" stroke="#2e1407" stroke-width="3" />

    <!-- Stylized Feather Quill/Chat Bubble overlay -->
    <path d="M 285,155 C 300,165 315,185 305,210 C 295,235 270,230 262,240 C 255,230 240,215 248,195 C 255,175 270,165 285,155 Z" fill="url(#goldGrad)" opacity="0.95" />
    <path d="M 295,145 L 282,160 L 287,165 L 300,150 Z" fill="#ffffff" />
  </g>
</svg>
